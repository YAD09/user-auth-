<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Sign Up | Web Platform</title>
    <meta name="description" content="Create your secure account. Protected via industry standard encryption.">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="form-header">
                <h1>Create Account</h1>
                <p>Join our secure platform today.</p>
            </div>
            
            <div id="general-alert" class="alert"></div>

            <form id="signup-form" novalidate>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" autocomplete="username" required>
                    <span class="error-message" id="username-error"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" autocomplete="email" required>
                    <span class="error-message" id="email-error"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" autocomplete="new-password" required>
                    <span class="error-message" id="password-error"></span>
                    <small style="color: var(--text-secondary); font-size: 0.75rem; display: block; margin-top: 0.25rem;">
                        Requires 8+ chars, uppercase, lowercase, number, and special character.
                    </small>
                </div>

                <button type="submit" class="btn-primary" id="submit-btn">
                    <span class="text">Create Account</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="form-footer">
                Already have an account? <a href="/login.html">Sign in instead</a>
            </div>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <div class="security-badge">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                    End-to-End Secure
                </div>
            </div>
        </div>
    </div>
    
    <script src="/js/signup.js"></script>
</body>
</html>
