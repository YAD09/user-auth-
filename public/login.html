<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | Web Platform</title>
    <meta name="description" content="Securely access your account.">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="form-header">
                <h1>Welcome Back</h1>
                <p>Enter your credentials to securely access your account.</p>
            </div>
            
            <div id="general-alert" class="alert"></div>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" autocomplete="username" required>
                    <span class="error-message" id="username-error"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" autocomplete="current-password" required>
                    <span class="error-message" id="password-error"></span>
                </div>

                <button type="submit" class="btn-primary" id="submit-btn">
                    <span class="text">Sign In</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="form-footer">
                New to the platform? <a href="/signup.html">Create an account</a>
            </div>
        </div>
    </div>
    
    <script src="/js/login.js"></script>
</body>
</html>
